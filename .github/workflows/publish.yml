name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      publish_mode:
        description: "Publish mode: oidc or bootstrap-token"
        required: true
        default: oidc
        type: choice
        options:
          - oidc
          - bootstrap-token

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Decide whether to publish
        id: decide
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          LOCAL_VER=$(node -p "require('./package.json').version")
          NPM_VER=$(npm view "$PKG_NAME" version 2>/dev/null || echo "0.0.0")
          echo "$PKG_NAME — local=$LOCAL_VER  npm=$NPM_VER"
          if [ "$LOCAL_VER" = "$NPM_VER" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish via one-time npm token
        if: steps.decide.outputs.publish == 'true' && github.event_name == 'workflow_dispatch' && inputs.publish_mode == 'bootstrap-token'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish via OIDC trusted publishing
        if: ${{ steps.decide.outputs.publish == 'true' && ((github.event_name == 'workflow_dispatch' && inputs.publish_mode == 'oidc') || (github.event_name == 'push' && vars.NPM_TRUSTED_PUBLISHING_ENABLED == 'true')) }}
        run: npm publish --access public --provenance

      - name: Skip publish until npm trust is configured
        if: ${{ steps.decide.outputs.publish == 'true' && github.event_name == 'push' && vars.NPM_TRUSTED_PUBLISHING_ENABLED != 'true' }}
        run: |
          echo "Build and tests passed."
          echo "Publishing is skipped until NPM_TRUSTED_PUBLISHING_ENABLED=true or workflow_dispatch publish_mode=bootstrap-token is used."
